
{% extends "mainDash/layouts/baseDash.html" %}
{% load static %}

{% block title %}Customs — Export Shipments{% endblock %}

{% block content %}

<div class="page-header d-print-none">
    <div class="container-xl">
        <div class="row g-2 align-items-center">
            <div class="col">
                <h2 class="page-title">Export Shipments</h2>
                <div class="page-pretitle">Outbound shipments — UK → West Africa</div>
            </div>
        </div>
    </div>
</div>

<div class="page-body">
    <div class="container-xl">

        <div class="row mb-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-body py-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-auto text-secondary">Filters:</div>
                            <div class="col ms-auto d-flex flex-wrap gap-2 justify-content-end">

                                <div class="position-relative" style="max-width:240px;">
                                    <input type="text"
                                           id="export-search-input"
                                           name="search"
                                           class="form-control pe-4"
                                           placeholder="Search shipment, order, customer..."
                                           value="{{ search_query }}"
                                           hx-get="{% url 'export_shipment_list' %}"
                                           hx-trigger="keyup changed delay:400ms, search"
                                           hx-target="#export-shipment-table-container"
                                           hx-swap="innerHTML"
                                           hx-push-url="true"
                                           hx-include="#export-status-filter, #export-customs-filter" />
                                    <button type="button"
                                            id="export-search-clear"
                                            class="p-0 text-secondary"
                                            style="display:{% if search_query %}block{% else %}none{% endif %};
                                                   position:absolute; right:8px; top:50%;
                                                   transform:translateY(-50%); line-height:1;
                                                   background:none; border:none; cursor:pointer;"
                                            aria-label="Clear search">
                                        <i class="bi bi-x-lg" style="font-size:0.75rem;"></i>
                                    </button>
                                </div>

                                <select id="export-status-filter"
                                        name="status"
                                        class="form-select"
                                        style="max-width:160px;"
                                        hx-get="{% url 'export_shipment_list' %}"
                                        hx-trigger="change"
                                        hx-target="#export-shipment-table-container"
                                        hx-swap="innerHTML"
                                        hx-push-url="true"
                                        hx-include="#export-search-input, #export-customs-filter">
                                    <option value="">All Status</option>
                                    {% for value, label in status_choices %}
                                    <option value="{{ value }}" {% if status_filter == value %}selected{% endif %}>
                                        {{ label }}
                                    </option>
                                    {% endfor %}
                                </select>

                                <select id="export-customs-filter"
                                        name="customs_status"
                                        class="form-select"
                                        style="max-width:180px;"
                                        hx-get="{% url 'export_shipment_list' %}"
                                        hx-trigger="change"
                                        hx-target="#export-shipment-table-container"
                                        hx-swap="innerHTML"
                                        hx-push-url="true"
                                        hx-include="#export-search-input, #export-status-filter">
                                    <option value="">All Customs Status</option>
                                    {% for value, label in customs_status_choices %}
                                    <option value="{{ value }}" {% if customs_status_filter == value %}selected{% endif %}>
                                        {{ label }}
                                    </option>
                                    {% endfor %}
                                </select>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row" id="export-shipment-table-container">
            {% include "mainDash/components/export_shipment_dataTable.html" %}
        </div>

    </div>
</div>

<script>
(function () {
    var input = document.getElementById('export-search-input');
    var clearBtn = document.getElementById('export-search-clear');
    function toggleClear() { clearBtn.style.display = input.value ? 'block' : 'none'; }
    input.addEventListener('input', toggleClear);
    clearBtn.addEventListener('click', function () {
        input.value = '';
        toggleClear();
        htmx.trigger(input, 'search');
    });
})();
</script>

{% endblock %}
