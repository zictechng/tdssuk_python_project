{% load static %}
<div class="col-11 mt-3">
    <form class="card" id="shipment-form"
          hx-post="{% url 'createNew_shipment' %}"
          hx-target="#toast-container"
          hx-swap="innerHTML">
        {% csrf_token %}

        <div class="accordion" id="accordion-shipment">
            <div class="accordion-item">
                <div class="accordion-header">
                    <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-1-shipment" aria-expanded="true">
                        <h3>Select Order</h3>
                        <div class="accordion-button-toggle">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-1"><path d="M6 9l6 6l6 -6"></path></svg>
                        </div>
                    </button>
                </div>
                <div id="collapse-1-shipment" class="accordion-collapse collapse show" data-bs-parent="#accordion-shipment">
                    <div class="accordion-body">
                        <div class="mb-3">
                            <label class="form-label">Order ready for shipment</label>
                            <select name="order" id="id_order" class="form-select" data-search="on" required>
                                <option value="">Select an order</option>
                                {% for o in eligible_orders %}
                                    <option value="{{ o.pk }}" data-uuid="{{ o.uuid }}">{{ o.order_number }} — {{ o.receiver_name }} ({{ o.order_destination_country }})</option>
                                {% endfor %}
                            </select>
                            <small class="form-hint">Only orders currently in Processing status are shown.</small>
                        </div>

                        <!-- Read-only order summary, injected when an order is picked -->
                        <div id="order-summary-target"></div>
                    </div>
                </div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-2-shipment" aria-expanded="false">
                        <h3>Shipment Details</h3>
                        <div class="accordion-button-toggle">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-1"><path d="M6 9l6 6l6 -6"></path></svg>
                        </div>
                    </button>
                </div>
                <div id="collapse-2-shipment" class="accordion-collapse collapse" data-bs-parent="#accordion-shipment">
                    <div class="accordion-body">
                        <div class="row row-cards">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Carrier Name</label>
                                    <input type="text" name="carrier_name" class="form-control" placeholder="e.g. DHL, FedEx, In-house fleet">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label class="form-label">Pickup Date</label>
                                    <input name="pickup_date" class="form-control datepicker" data-min-date="today" placeholder="Select a date">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label class="form-label">Expected Delivery Date</label>
                                    <input name="expected_delivery_date" class="form-control datepicker" data-min-date="today" placeholder="Select a date">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="mb-3 mb-0">
                                    <label class="form-label">Additional Note</label>
                                    <textarea name="notes" rows="4" class="form-control" placeholder="Any handling instructions..."></textarea>
                                    <small class="form-hint">Optional.</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-footer text-end">
            <button type="button" class="btn btn-primary btn-sm js-htmx-action" data-bs-toggle="modal" data-bs-target="#confirm-submit-shipment-modal">
                Create Shipment
            </button>
        </div>
    </form>

    <div class="modal modal-blur fade" id="confirm-submit-shipment-modal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-body">
                    <div class="modal-title">Are you sure?</div>
                    <div class="text-muted mt-1">You want to create this shipment?</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-link link-secondary me-auto" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirm-submit-shipment-btn" data-bs-dismiss="modal">Yes, Create</button>
                </div>
            </div>
        </div>
    </div>
</div>

{% include "mainDash/includes/createShipment_script.html" %}
