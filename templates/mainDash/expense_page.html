
{% extends "mainDash/layouts/baseDash.html" %}
{% load static %}

{% block title %}Finance — Expenses{% endblock %}

{% block content %}

<div class="page-header d-print-none" aria-label="Page header">
    <div class="container-xl">
        <div class="row g-2 align-items-center">
            <div class="col">
                <h2 class="page-title">Expenses</h2>
                <div class="page-pretitle">Track all operational expenses</div>
            </div>
            <div class="col-auto ms-auto d-print-none">
                <div class="btn-list">
                    <a href="{% url 'expense_create' %}" class="btn btn-primary btn-sm d-none d-sm-inline-block">
                        <i class="bi bi-plus-lg me-1"></i> Add Expense
                    </a>
                    <a href="{% url 'expense_create' %}" class="btn btn-primary d-sm-none btn-icon">
                        <i class="bi bi-plus-lg"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="page-body">
    <div class="container-xl">

        <div class="row mb-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-body py-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-auto text-secondary">Filters:</div>
                            <div class="col ms-auto d-flex flex-wrap gap-2 justify-content-end">

                                <div class="position-relative" style="max-width: 240px;">
                                    <input
                                        type="text"
                                        id="expense-search-input"
                                        name="search"
                                        class="form-control pe-4"
                                        placeholder="Search description, warehouse..."
                                        value="{{ search_query }}"
                                        hx-get="{% url 'expense_list' %}"
                                        hx-trigger="keyup changed delay:400ms, search"
                                        hx-target="#expense-table-container"
                                        hx-swap="innerHTML"
                                        hx-push-url="true"
                                        hx-include="#expense-category-filter, #expense-currency-filter"
                                    />
                                    <button type="button" id="expense-search-clear"
                                            class="p-0 text-secondary"
                                            style="display:{% if search_query %}block{% else %}none{% endif %};
                                                   position:absolute; right:8px; top:50%;
                                                   transform:translateY(-50%); line-height:1;
                                                   background:none; border:none; cursor:pointer;"
                                            aria-label="Clear search">
                                        <i class="bi bi-x-lg" style="font-size:0.75rem;"></i>
                                    </button>
                                </div>

                                <select id="expense-category-filter" name="category"
                                        class="form-select" style="max-width: 180px;"
                                        hx-get="{% url 'expense_list' %}"
                                        hx-trigger="change"
                                        hx-target="#expense-table-container"
                                        hx-swap="innerHTML"
                                        hx-push-url="true"
                                        hx-include="#expense-search-input, #expense-currency-filter">
                                    <option value="">All Categories</option>
                                    {% for value, label in category_choices %}
                                    <option value="{{ value }}" {% if category_filter == value %}selected{% endif %}>
                                        {{ label }}
                                    </option>
                                    {% endfor %}
                                </select>

                                <select id="expense-currency-filter" name="currency"
                                        class="form-select" style="max-width: 160px;"
                                        hx-get="{% url 'expense_list' %}"
                                        hx-trigger="change"
                                        hx-target="#expense-table-container"
                                        hx-swap="innerHTML"
                                        hx-push-url="true"
                                        hx-include="#expense-search-input, #expense-category-filter">
                                    <option value="">All Currencies</option>
                                    {% for value, label in currency_choices %}
                                    <option value="{{ value }}" {% if currency_filter == value %}selected{% endif %}>
                                        {{ label }}
                                    </option>
                                    {% endfor %}
                                </select>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row" id="expense-table-container">
            {% include "mainDash/components/expense_dataTable.html" %}
        </div>

    </div>
</div>

<script>
(function () {
    var input = document.getElementById('expense-search-input');
    var clearBtn = document.getElementById('expense-search-clear');

    function toggleClear() {
        clearBtn.style.display = input.value ? 'block' : 'none';
    }

    input.addEventListener('input', toggleClear);

    clearBtn.addEventListener('click', function () {
        input.value = '';
        toggleClear();
        htmx.trigger(input, 'search');
    });
})();
</script>

{% endblock %}
