{% extends "mainDash/layouts/baseDash.html" %}
{% load static humanize %}

{% block title %}User Activity{% endblock %}

{% block content %}

<div class="page-header d-print-none">
    <div class="container-xl">
        <div class="row g-2 align-items-center">
            <div class="col">
                <h2 class="page-title">User Activity</h2>
                <div class="page-pretitle">All system create, update and delete actions</div>
            </div>
        </div>
    </div>
</div>

<div class="page-body">
    <div class="container-xl">

        <div class="row mb-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-body py-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-auto text-secondary">Filters:</div>
                            <div class="col ms-auto d-flex flex-wrap gap-2 justify-content-end">

                                <div class="position-relative" style="max-width: 260px;">
                                    <input type="text"
                                           id="activity-search-input"
                                           name="search"
                                           class="form-control pe-4"
                                           placeholder="Search user, description..."
                                           value="{{ search }}"
                                           hx-get="{% url 'user_activity_list' %}"
                                           hx-trigger="keyup changed delay:400ms, search"
                                           hx-target="#user-activity-container"
                                           hx-swap="innerHTML"
                                           hx-include="#activity-action-filter"
                                           hx-push-url="true" />
                                    <button type="button"
                                            id="activity-search-clear"
                                            class="p-0 text-secondary"
                                            style="display:{% if search %}block{% else %}none{% endif %};
                                                   position:absolute; right:8px; top:50%;
                                                   transform:translateY(-50%); line-height:1;
                                                   background:none; border:none; cursor:pointer;"
                                            aria-label="Clear search">
                                        <i class="bi bi-x-lg" style="font-size:0.75rem;"></i>
                                    </button>
                                </div>

                                <select id="activity-action-filter"
                                        name="action"
                                        class="form-select"
                                        style="max-width: 180px;"
                                        hx-get="{% url 'user_activity_list' %}"
                                        hx-trigger="change"
                                        hx-target="#user-activity-container"
                                        hx-swap="innerHTML"
                                        hx-include="#activity-search-input"
                                        hx-push-url="true">
                                    <option value="">All Actions</option>
                                    <option value="created" {% if action_filter == 'created' %}selected{% endif %}>Created</option>
                                    <option value="updated" {% if action_filter == 'updated' %}selected{% endif %}>Updated</option>
                                    <option value="deleted" {% if action_filter == 'deleted' %}selected{% endif %}>Deleted</option>
                                </select>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row row-deck row-cards" id="user-activity-container">
            {% include "mainDash/components/user_activity_table.html" %}
        </div>

    </div>
</div>

<script>
(function () {
    var input    = document.getElementById('activity-search-input');
    var clearBtn = document.getElementById('activity-search-clear');
    function toggleClear() { clearBtn.style.display = input.value ? 'block' : 'none'; }
    input.addEventListener('input', toggleClear);
    clearBtn.addEventListener('click', function () {
        input.value = '';
        toggleClear();
        htmx.trigger(input, 'search');
    });
})();
</script>

{% endblock %}
