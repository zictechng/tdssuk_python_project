{% extends "mainDash/layouts/baseDash.html" %}
{% load static %}

{% block title %}
    Fleet — All Vehicles
{% endblock %}

{% block content %}

    <div class="page-header d-print-none" aria-label="Page header">
        <div class="container-xl">
            <div class="row g-2 align-items-center">
                <div class="col">
                    <h2 class="page-title">Fleet — All Vehicles</h2>
                    <div class="page-pretitle">Manage in-house and third-party vehicles</div>
                </div>
                <div class="col-auto ms-auto d-print-none">
                    <div class="btn-list">
                        <a href="{% url 'vehicle_create' %}" class="btn btn-primary btn-sm d-none d-sm-inline-block">
                            <i class="bi bi-plus-lg"></i>
                            Add Vehicle
                        </a>
                        <a href="#" class="btn btn-primary btn-6 d-sm-none btn-icon" aria-label="Create new report">
                            <i class="bi bi-plus-lg"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="page-body">
        <div class="container-xl">

          <div class="row mb-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-body py-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-auto text-secondary">
                                Filters:
                            </div>
                            <div class="col ms-auto d-flex flex-wrap gap-2 justify-content-end">

                                <div class="position-relative" style="max-width: 240px;">
                                  <input
                                      type="text"
                                      id="vehicle-search-input"
                                      name="search"
                                      class="form-control pe-4"
                                      placeholder="Search name, plate, carrier..."
                                      hx-get="{% url 'vehicle_list' %}"
                                      hx-trigger="keyup changed delay:400ms, search"
                                      hx-target="#vehicles-table-container"
                                      hx-swap="innerHTML"
                                      hx-push-url="true"
                                      hx-include="#vehicle-ownership-filter, #vehicle-status-filter"
                                  />
                                  <button
                                      type="button"
                                      id="vehicle-search-clear"
                                      class="p-0 text-secondary"
                                      style="display:none; position:absolute; right:8px; top:50%; transform:translateY(-50%); line-height:1; background:none; border:none; cursor:pointer;"
                                      aria-label="Clear search"
                                  >
                                      <i class="bi bi-x-lg" style="font-size: 0.75rem;"></i>
                                  </button>
                              </div>

                                <select
                                    id="vehicle-ownership-filter"
                                    name="ownership"
                                    class="form-select"
                                    style="max-width: 180px;"
                                    hx-get="{% url 'vehicle_list' %}"
                                    hx-trigger="change"
                                    hx-target="#vehicles-table-container"
                                    hx-swap="innerHTML"
                                    hx-push-url="true"
                                    hx-include="#vehicle-search-input, #vehicle-status-filter"
                                >
                                    <option value="">All Ownership</option>
                                    <option value="in_house">In-House</option>
                                    <option value="third_party">Third-Party Carrier</option>
                                </select>

                                <select
                                    id="vehicle-status-filter"
                                    name="status"
                                    class="form-select"
                                    style="max-width: 180px;"
                                    hx-get="{% url 'vehicle_list' %}"
                                    hx-trigger="change"
                                    hx-target="#vehicles-table-container"
                                    hx-swap="innerHTML"
                                    hx-push-url="true"
                                    hx-include="#vehicle-search-input, #vehicle-ownership-filter"
                                >
                                    <option value="">All Status</option>
                                    <option value="available">Available</option>
                                    <option value="on_route">On Route</option>
                                    <option value="maintenance">Under Maintenance</option>
                                    <option value="out_of_service">Out of Service</option>
                                </select>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

            <div class="row row-deck row-cards" id="vehicles-table-container">
                {% include "mainDash/components/vehicle_dataTable.html" %}
            </div>
        </div>
    </div>

    <script>
(function () {
    const input = document.getElementById('vehicle-search-input');
    const clearBtn = document.getElementById('vehicle-search-clear');

    function toggleClear() {
        clearBtn.style.display = input.value ? 'block' : 'none';
    }

    input.addEventListener('input', toggleClear);

    clearBtn.addEventListener('click', function () {
        input.value = '';
        toggleClear();
        // Trigger HTMX to re-fetch with empty search
        htmx.trigger(input, 'search');
    });
})();
</script>

{% endblock %}
