
{% extends "mainDash/layouts/baseDash.html" %}
{% load static %}


{% block title %}Documents — Delivery Notes{% endblock %}


{% block content %}


<div class="page-header d-print-none" aria-label="Page header">
    <div class="container-xl">
        <div class="row g-2 align-items-center">
            <div class="col">
                <h2 class="page-title">Delivery Notes</h2>
                <div class="page-pretitle">All delivery confirmation documents</div>
            </div>
            <div class="col-auto ms-auto d-print-none">
                <div class="btn-list">
                    <a href="{% url 'uploaded_document_create' %}"
                       class="btn btn-primary btn-sm d-none d-sm-inline-block">
                        <i class="bi bi-plus-lg me-1"></i> Upload Note
                    </a>
                    <a href="{% url 'uploaded_document_create' %}"
                       class="btn btn-primary d-sm-none btn-icon">
                        <i class="bi bi-plus-lg"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>


<div class="page-body">
    <div class="container-xl">


        <div class="row mb-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-body py-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-auto text-secondary">Filters:</div>
                            <div class="col ms-auto d-flex flex-wrap gap-2 justify-content-end">

                                <div class="position-relative" style="max-width: 240px;">
                                    <input type="text"
                                           id="note-search-input"
                                           name="search"
                                           class="form-control pe-4"
                                           placeholder="Search title, shipment..."
                                           value="{{ search }}"
                                           hx-get="{% url 'delivery_note_list' %}"
                                           hx-trigger="keyup changed delay:400ms, search"
                                           hx-target="#notes-table-container"
                                           hx-swap="innerHTML"
                                           hx-push-url="true" />
                                    <button type="button"
                                            id="note-search-clear"
                                            class="p-0 text-secondary"
                                            style="display:{% if search %}block{% else %}none{% endif %};
                                                   position:absolute; right:8px; top:50%;
                                                   transform:translateY(-50%); line-height:1;
                                                   background:none; border:none; cursor:pointer;"
                                            aria-label="Clear search">
                                        <i class="bi bi-x-lg" style="font-size:0.75rem;"></i>
                                    </button>
                                </div>

                                <select id="note-status-filter"
                                        name="status"
                                        class="form-select"
                                        style="max-width: 180px;"
                                        hx-get="{% url 'delivery_note_list' %}"
                                        hx-trigger="change"
                                        hx-target="#notes-table-container"
                                        hx-swap="innerHTML"
                                        hx-push-url="true"
                                        hx-include="#note-search-input">
                                    <option value="">All Statuses</option>
                                    <option value="pending" {% if status == 'pending' %}selected{% endif %}>Pending</option>
                                    <option value="approved" {% if status == 'approved' %}selected{% endif %}>Approved</option>
                                    <option value="rejected" {% if status == 'rejected' %}selected{% endif %}>Rejected</option>
                                </select>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <div class="row" id="notes-table-container">
            {% include "mainDash/components/delivery_note_dataTable.html" %}
        </div>


    </div>
</div>


<script>
(function () {
    var input    = document.getElementById('note-search-input');
    var clearBtn = document.getElementById('note-search-clear');
    function toggleClear() { clearBtn.style.display = input.value ? 'block' : 'none'; }
    input.addEventListener('input', toggleClear);
    clearBtn.addEventListener('click', function () {
        input.value = '';
        toggleClear();
        htmx.trigger(input, 'search');
    });
})();
</script>


{% endblock %}
