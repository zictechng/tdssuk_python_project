
{% extends "mainDash/layouts/baseDash.html" %}
{% load static %}

{% block title %}Audit Logs{% endblock %}

{% block content %}

<div class="page-header d-print-none">
  <div class="container-xl">
    <div class="row g-2 align-items-center">
      <div class="col">
        <div class="page-pretitle">System Administration</div>
        <h2 class="page-title">Audit Logs</h2>
      </div>
    </div>
  </div>
</div>

<div class="page-body">
  <div class="container-xl">

    <!-- Filters -->
    <div class="card mb-3">
      <div class="card-body py-3">
        <div class="row g-2 align-items-center">
          <div class="col-auto text-secondary">Filters:</div>
          <div class="col ms-auto d-flex flex-wrap gap-2 justify-content-end">

            <div class="position-relative" style="max-width:260px;">
              <input type="text" id="audit-search" name="q"
                     class="form-control pe-4"
                     placeholder="User, model, record..."
                     value="{{ q }}"
                     hx-get="{% url 'audit_logs' %}"
                     hx-trigger="keyup changed delay:400ms, search"
                     hx-target="#audit-container"
                     hx-swap="innerHTML"
                     hx-include="#audit-action-filter, #audit-date-from, #audit-date-to"
                     hx-push-url="true" />
              <button type="button" id="audit-search-clear"
                      class="p-0 text-secondary"
                      style="display:{% if q %}block{% else %}none{% endif %};
                             position:absolute; right:8px; top:50%;
                             transform:translateY(-50%);
                             background:none; border:none; cursor:pointer;">
                <i class="bi bi-x-lg" style="font-size:.75rem;"></i>
              </button>
            </div>

            <select id="audit-action-filter" name="action"
                    class="form-select" style="max-width:160px;"
                    hx-get="{% url 'audit_logs' %}"
                    hx-trigger="change"
                    hx-target="#audit-container"
                    hx-swap="innerHTML"
                    hx-include="#audit-search, #audit-date-from, #audit-date-to"
                    hx-push-url="true">
              <option value="">All Actions</option>
              {% for a in actions %}
              <option value="{{ a }}" {% if action == a %}selected{% endif %}>{{ a|title }}</option>
              {% endfor %}
            </select>
        <div class="position-relative" style="max-width:150px;">    
            <input type="date"
                id="audit-date-from"
                name="date_from"
                class="form-control"
                style="max-width:150px;"
                value="{{ date_from }}"
                hx-get="{% url 'audit_logs' %}"
                hx-trigger="change"
                hx-target="#audit-container"
                hx-swap="innerHTML"
                hx-include="#audit-search, #audit-action-filter, #audit-date-to"
                hx-push-url="true" />
                 <button type="button"
                    id="clear-date-from"
                    class="p-0 text-secondary"
                    style="display:{% if date_from %}block{% else %}none{% endif %};
                            position:absolute; right:34px; top:50%;
                            transform:translateY(-50%);
                            background:none; border:none; cursor:pointer; z-index:10;">
                <i class="bi bi-x-lg" style="font-size:.75rem;"></i>
            </button>
            </div>

        <div class="position-relative" style="max-width:150px;">
            <input type="date"
                id="audit-date-to"
                name="date_to"
                class="form-control"
                style="max-width:150px;"
                value="{{ date_to }}"
                hx-get="{% url 'audit_logs' %}"
                hx-trigger="change"
                hx-target="#audit-container"
                hx-swap="innerHTML"
                hx-include="#audit-search, #audit-action-filter, #audit-date-from"
                hx-push-url="true" />
                <button type="button"
                    id="clear-date-to"
                    class="p-0 text-secondary"
                    style="display:{% if date_to %}block{% else %}none{% endif %};
                            position:absolute; right:34px; top:50%;
                            transform:translateY(-50%);
                            background:none; border:none; cursor:pointer; z-index:10;">
                <i class="bi bi-x-lg" style="font-size:.75rem;"></i>
            </button>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div id="audit-container">
      {% include "mainDash/components/audit_logs_table.html" %}
    </div>

  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  var input = document.getElementById('audit-search');
  var clear = document.getElementById('audit-search-clear');
  input.addEventListener('input', function () {
    clear.style.display = input.value ? 'block' : 'none';
  });
  clear.addEventListener('click', function () {
    input.value = '';
    clear.style.display = 'none';
    htmx.trigger(input, 'search');
  });

});


var dateFrom  = document.getElementById('audit-date-from');
var dateTo    = document.getElementById('audit-date-to');
var clearFrom = document.getElementById('clear-date-from');
var clearTo   = document.getElementById('clear-date-to');

clearFrom.addEventListener('click', function () {
    dateFrom.value = '';
    this.style.display = 'none';
    htmx.trigger(dateFrom, 'change');
});
clearTo.addEventListener('click', function () {
    dateTo.value = '';
    this.style.display = 'none';
    htmx.trigger(dateTo, 'change');
});

dateFrom.addEventListener('change', function () {
    clearFrom.style.display = this.value ? 'block' : 'none';
});
dateTo.addEventListener('change', function () {
    clearTo.style.display = this.value ? 'block' : 'none';
});
</script>

{% endblock %}
