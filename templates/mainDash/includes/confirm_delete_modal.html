<div class="modal modal-blur fade" id="confirm-delete-modal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-body">
                <div class="modal-title" id="confirm-delete-title">Are you sure?</div>
                <div class="text-muted mt-1" id="confirm-delete-message">This action cannot be undone.</div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-link link-secondary me-auto"
                        data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirm-delete-btn">
                    <span id="confirm-delete-label">Yes, Delete</span>
                    <span id="confirm-delete-spinner"
                          class="spinner-border spinner-border-sm ms-2"
                          style="display:none;" role="status" aria-hidden="true"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<button type="button" id="open-confirm-delete-trigger" class="d-none"
        data-bs-toggle="modal" data-bs-target="#confirm-delete-modal"></button>
