{% extends "mainDash/layouts/baseDash.html" %}
{% load static %}

{% block title %}Deleted Users{% endblock %}

{% block content %}

<div class="page-header d-print-none" aria-label="Page header">
    <div class="container-xl">
        <div class="row g-2 align-items-center">
            <div class="col">
                <h2 class="page-title">Deleted Users</h2>
                <div class="page-pretitle">Soft-deleted accounts — restore to reactivate</div>
            </div>
            <div class="col-auto ms-auto d-print-none">
                <a href="{% url 'user_list' %}"
                   class="btn btn-secondary btn-sm d-none d-sm-inline-block">
                    <i class="bi bi-arrow-left me-1"></i> Back to Users
                </a>
            </div>
        </div>
    </div>
</div>

<div class="page-body">
    <div class="container-xl">

        <div class="row mb-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-body py-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-auto text-secondary">Filters:</div>
                            <div class="col ms-auto d-flex flex-wrap gap-2 justify-content-end">
                                <div class="position-relative" style="max-width: 260px;">
                                    <input type="text"
                                           id="deleted-search-input"
                                           name="search"
                                           class="form-control pe-4"
                                           placeholder="Search name, email..."
                                           value="{{ search }}"
                                           hx-get="{% url 'user_deleted_list' %}"
                                           hx-trigger="keyup changed delay:400ms, search"
                                           hx-target="#users-deleted-table-container"
                                           hx-swap="innerHTML"
                                           hx-push-url="true" />
                                    <button type="button"
                                            id="deleted-search-clear"
                                            class="p-0 text-secondary"
                                            style="display:{% if search %}block{% else %}none{% endif %};
                                                   position:absolute; right:8px; top:50%;
                                                   transform:translateY(-50%); line-height:1;
                                                   background:none; border:none; cursor:pointer;"
                                            aria-label="Clear search">
                                        <i class="bi bi-x-lg" style="font-size:0.75rem;"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row row-deck row-cards" id="users-deleted-table-container">
            {% include "mainDash/components/user_deleted_dataTable.html" %}
        </div>

    </div>
</div>


<script>
(function () {
    var input    = document.getElementById('user-search-input');
    var clearBtn = document.getElementById('user-search-clear');
    function toggleClear() { clearBtn.style.display = input.value ? 'block' : 'none'; }
    input.addEventListener('input', toggleClear);
    clearBtn.addEventListener('click', function () {
        input.value = '';
        toggleClear();
        htmx.trigger(input, 'search');
    });
})();
</script>

{% endblock %}
