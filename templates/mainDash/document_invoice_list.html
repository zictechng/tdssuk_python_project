
{% extends "mainDash/layouts/baseDash.html" %}
{% load static %}


{% block title %}Documents — Invoices{% endblock %}


{% block content %}


<div class="page-header d-print-none" aria-label="Page header">
    <div class="container-xl">
        <div class="row g-2 align-items-center">
            <div class="col">
                <h2 class="page-title">Invoices</h2>
                <div class="page-pretitle">Print-ready invoice documents</div>
            </div>
        </div>
    </div>
</div>


<div class="page-body">
    <div class="container-xl">


        <div class="row mb-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-body py-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-auto text-secondary">Filters:</div>
                            <div class="col ms-auto d-flex flex-wrap gap-2 justify-content-end">

                                <div class="position-relative" style="max-width: 240px;">
                                    <input type="text"
                                           id="invoice-search-input"
                                           name="search"
                                           class="form-control pe-4"
                                           placeholder="Search invoice no. or order..."
                                           value="{{ search }}"
                                           hx-get="{% url 'document_invoice_list' %}"
                                           hx-trigger="keyup changed delay:400ms, search"
                                           hx-target="#invoices-table-container"
                                           hx-swap="innerHTML"
                                           hx-push-url="true"
                                           hx-include="#invoice-status-filter" />
                                    <button type="button"
                                            id="invoice-search-clear"
                                            class="p-0 text-secondary"
                                            style="display:{% if search %}block{% else %}none{% endif %};
                                                   position:absolute; right:8px; top:50%;
                                                   transform:translateY(-50%); line-height:1;
                                                   background:none; border:none; cursor:pointer;"
                                            aria-label="Clear search">
                                        <i class="bi bi-x-lg" style="font-size:0.75rem;"></i>
                                    </button>
                                </div>

                                <select id="invoice-status-filter"
                                        name="status"
                                        class="form-select"
                                        style="max-width: 180px;"
                                        hx-get="{% url 'document_invoice_list' %}"
                                        hx-trigger="change"
                                        hx-target="#invoices-table-container"
                                        hx-swap="innerHTML"
                                        hx-push-url="true"
                                        hx-include="#invoice-search-input">
                                    <option value="">All Statuses</option>
                                    <option value="draft" {% if status_filter == 'draft' %}selected{% endif %}>Draft</option>
                                    <option value="sent" {% if status_filter == 'sent' %}selected{% endif %}>Sent</option>
                                    <option value="paid" {% if status_filter == 'paid' %}selected{% endif %}>Paid</option>
                                    <option value="overdue" {% if status_filter == 'overdue' %}selected{% endif %}>Overdue</option>
                                    <option value="cancelled" {% if status_filter == 'cancelled' %}selected{% endif %}>Cancelled</option>
                                </select>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <div class="row" id="invoices-table-container">
            {% include "mainDash/components/document_invoice_dataTable.html" %}
        </div>


    </div>
</div>


<script>
(function () {
    var input    = document.getElementById('invoice-search-input');
    var clearBtn = document.getElementById('invoice-search-clear');
    function toggleClear() { clearBtn.style.display = input.value ? 'block' : 'none'; }
    input.addEventListener('input', toggleClear);
    clearBtn.addEventListener('click', function () {
        input.value = '';
        toggleClear();
        htmx.trigger(input, 'search');
    });
})();
</script>


{% endblock %}
